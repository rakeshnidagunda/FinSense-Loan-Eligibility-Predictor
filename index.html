<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinSense — Personal Loan Eligibility Predictor</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #00b4d8;
      --accent2:  #0077b6;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #e3b341;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   12px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--accent); }
    header p  { color: var(--muted); margin-top: 6px; font-size: .95rem; }

    /* ── Progress bar ── */
    .progress-wrap {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 28px 20px 0;
      max-width: 700px;
      margin: 0 auto;
    }
    .step-bubble {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .step-bubble:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 18px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }
    .step-bubble.done:not(:last-child)::after { background: var(--accent); }
    .bubble-num {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      position: relative; z-index: 1;
      transition: all .3s;
    }
    .step-bubble.active .bubble-num  { border-color: var(--accent); color: var(--accent); background: #00b4d81a; }
    .step-bubble.done .bubble-num    { border-color: var(--green); background: var(--green); color: #fff; }
    .bubble-label { font-size: .7rem; color: var(--muted); margin-top: 6px; text-align: center; }
    .step-bubble.active .bubble-label { color: var(--accent); }

    /* ── Main layout ── */
    main { max-width: 760px; margin: 32px auto 60px; padding: 0 16px; }

    /* ── Step card ── */
    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      display: none;
      animation: fadeIn .3s ease;
    }
    .step-card.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .step-card h2 {
      font-size: 1.15rem;
      margin-bottom: 24px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .step-card h2 span { font-size: 1.3rem; }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 540px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* ── Form controls ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    label  { font-size: .8rem; color: var(--muted); font-weight: 500; }
    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: .95rem;
      width: 100%;
      transition: border-color .2s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface); }

    /* ── Buttons ── */
    .btn-row { display: flex; justify-content: space-between; margin-top: 28px; gap: 12px; }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent2); color: #fff; }
    .btn-primary:hover { background: var(--accent); }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
    .btn-submit { background: linear-gradient(135deg, #0077b6, #00b4d8); color: #fff; flex: 1; }
    .btn-submit:hover { opacity: .9; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Result card ── */
    #result { display: none; }
    .result-header {
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 32px;
      text-align: center;
    }
    .approved-header  { background: linear-gradient(135deg, #1a3a2a, #1f4a34); border: 1px solid #3fb95044; }
    .rejected-header  { background: linear-gradient(135deg, #3a1a1a, #4a2020); border: 1px solid #f8514944; }
    .result-verdict { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
    .result-confidence { color: var(--muted); font-size: .9rem; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      border-top: 0;
    }
    @media (max-width: 540px) { .metrics-grid { grid-template-columns: 1fr 1fr; } }
    .metric-box {
      padding: 20px 16px;
      text-align: center;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .metric-box:last-child { border-right: 0; }
    .metric-val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .metric-lbl { font-size: .72rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }

    .feedback-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 24px 28px;
    }
    .feedback-block { margin-bottom: 20px; }
    .feedback-block h3 { font-size: .85rem; font-weight: 700; margin-bottom: 12px; letter-spacing: .04em; text-transform: uppercase; }
    .h3-green { color: var(--green); }
    .h3-red   { color: var(--red); }
    .h3-yellow{ color: var(--yellow); }
    .feedback-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      font-size: .88rem;
      line-height: 1.5;
    }
    .feedback-icon { flex-shrink: 0; margin-top: 2px; }

    .btn-again {
      display: block;
      margin: 20px auto 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .9rem;
      transition: all .2s;
    }
    .btn-again:hover { color: var(--text); border-color: var(--accent); }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #fff4;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    .error-banner {
      background: #3a1a1a;
      border: 1px solid #f8514966;
      border-radius: 8px;
      color: var(--red);
      padding: 12px 16px;
      margin-top: 16px;
      font-size: .88rem;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>🏦 FinSense</h1>
  <p>AI-powered Personal Loan Eligibility Predictor &nbsp;·&nbsp; 94.8% Accuracy</p>
</header>

<!-- Progress -->
<div class="progress-wrap">
  <div class="step-bubble active" id="pb1">
    <div class="bubble-num">1</div>
    <div class="bubble-label">Personal</div>
  </div>
  <div class="step-bubble" id="pb2">
    <div class="bubble-num">2</div>
    <div class="bubble-label">Employment</div>
  </div>
  <div class="step-bubble" id="pb3">
    <div class="bubble-num">3</div>
    <div class="bubble-label">Finances</div>
  </div>
  <div class="step-bubble" id="pb4">
    <div class="bubble-num">4</div>
    <div class="bubble-label">Loan</div>
  </div>
</div>

<main>

  <!-- ── Step 1: Personal ── -->
  <div class="step-card active" id="step1">
    <h2><span>👤</span> Personal Details</h2>
    <div class="grid-2">
      <div class="field">
        <label>Age</label>
        <input type="number" id="Age" placeholder="e.g. 30" min="21" max="65" />
      </div>
      <div class="field">
        <label>Gender</label>
        <select id="Gender">
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>
      <div class="field">
        <label>Marital Status</label>
        <select id="Marital_Status">
          <option value="">Select</option>
          <option>Single</option>
          <option>Married</option>
          <option>Divorced</option>
        </select>
      </div>
      <div class="field">
        <label>Dependents</label>
        <select id="Dependents">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3+</option>
        </select>
      </div>
      <div class="field">
        <label>Education</label>
        <select id="Education">
          <option value="">Select</option>
          <option>High School</option>
          <option>Bachelor</option>
          <option>Master</option>
          <option>PhD</option>
        </select>
      </div>
      <div class="field">
        <label>City Tier</label>
        <select id="City_Tier">
          <option value="">Select</option>
          <option>Tier 1</option>
          <option>Tier 2</option>
          <option>Tier 3</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <div></div>
      <button class="btn btn-primary" onclick="goTo(2)">Next →</button>
    </div>
  </div>

  <!-- ── Step 2: Employment ── -->
  <div class="step-card" id="step2">
    <h2><span>💼</span> Employment Details</h2>
    <div class="grid-2">
      <div class="field">
        <label>Employment Type</label>
        <select id="Employment_Type" onchange="toggleEmpCat()">
          <option value="">Select</option>
          <option>Salaried</option>
          <option>Self-Employed</option>
        </select>
      </div>
      <div class="field" id="emp_cat_field">
        <label>Employer Category</label>
        <select id="Employer_Category">
          <option value="">Select</option>
          <option>MNC</option>
          <option>Government</option>
          <option>Private SME</option>
          <option>Startup</option>
          <option>Self-Employed</option>
        </select>
      </div>
      <div class="field">
        <label>Work Experience (Years)</label>
        <input type="number" id="Work_Experience_Yrs" placeholder="e.g. 5" min="0" max="40" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goTo(1)">← Back</button>
      <button class="btn btn-primary" onclick="goTo(3)">Next →</button>
    </div>
  </div>

  <!-- ── Step 3: Finances ── -->
  <div class="step-card" id="step3">
    <h2><span>💰</span> Financial Details</h2>
    <div class="grid-2">
      <div class="field">
        <label>Net Monthly Income (₹)</label>
        <input type="number" id="Net_Monthly_Income" placeholder="e.g. 75000" min="0" />
      </div>
      <div class="field">
        <label>Monthly Expenses (₹)</label>
        <input type="number" id="Monthly_Expenses" placeholder="e.g. 28000" min="0" />
      </div>
      <div class="field">
        <label>Existing EMI / month (₹) <small style="color:var(--muted)">(0 if none)</small></label>
        <input type="number" id="Existing_EMI" placeholder="0" min="0" value="0" />
      </div>
      <div class="field">
        <label>CIBIL Score</label>
        <input type="number" id="CIBIL_Score" placeholder="300–900" min="300" max="900" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goTo(2)">← Back</button>
      <button class="btn btn-primary" onclick="goTo(4)">Next →</button>
    </div>
  </div>

  <!-- ── Step 4: Loan ── -->
  <div class="step-card" id="step4">
    <h2><span>🏦</span> Loan Request</h2>
    <div class="grid-2">
      <div class="field">
        <label>Loan Amount Requested (₹)</label>
        <input type="number" id="Loan_Amount_Requested" placeholder="e.g. 300000" min="10000" />
      </div>
      <div class="field">
        <label>Loan Tenure</label>
        <select id="Loan_Tenure_Months">
          <option value="">Select tenure</option>
          <option value="12">12 months (1 yr)</option>
          <option value="24">24 months (2 yrs)</option>
          <option value="36">36 months (3 yrs)</option>
          <option value="48">48 months (4 yrs)</option>
          <option value="60">60 months (5 yrs)</option>
        </select>
      </div>
    </div>
    <div id="errorBanner" class="error-banner"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goTo(3)">← Back</button>
      <button class="btn btn-submit" id="submitBtn" onclick="submitForm()">
        Check Eligibility
      </button>
    </div>
  </div>

  <!-- ── Result ── -->
  <div id="result">
    <div id="resultHeader" class="result-header">
      <div id="resultVerdict" class="result-verdict"></div>
      <div id="resultConf"   class="result-confidence"></div>
    </div>
    <div class="metrics-grid">
      <div class="metric-box">
        <div class="metric-val" id="mDTI">—</div>
        <div class="metric-lbl">Debt-to-Income</div>
      </div>
      <div class="metric-box">
        <div class="metric-val" id="mRate">—</div>
        <div class="metric-lbl">Interest Rate</div>
      </div>
      <div class="metric-box">
        <div class="metric-val" id="mMax">—</div>
        <div class="metric-lbl">Max Eligible Loan</div>
      </div>
      <div class="metric-box">
        <div class="metric-val" id="mEMI1">—</div>
        <div class="metric-lbl">EMI (Requested)</div>
      </div>
      <div class="metric-box" style="border-right:0">
        <div class="metric-val" id="mEMI2">—</div>
        <div class="metric-lbl">EMI (Max Eligible)</div>
      </div>
    </div>
    <div class="feedback-section">
      <div id="fbStrengths" class="feedback-block"></div>
      <div id="fbProblems"  class="feedback-block"></div>
      <div id="fbTips"      class="feedback-block"></div>
    </div>
    <button class="btn-again" onclick="resetForm()">← Check another application</button>
  </div>

</main>

<script>
  // ── Validation helpers ────────────────────────────────────────────────────
  function val(id)   { return document.getElementById(id).value.trim(); }
  function num(id)   { return parseFloat(val(id)); }

  function showErr(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = msg;
    b.style.display = 'block';
  }
  function clearErr() {
    document.getElementById('errorBanner').style.display = 'none';
  }

  function validateStep(n) {
    if (n === 1) {
      if (!val('Age') || isNaN(num('Age')) || num('Age') < 21 || num('Age') > 65)
        return 'Enter a valid age (21–65)';
      if (!val('Gender'))         return 'Select your gender';
      if (!val('Marital_Status')) return 'Select marital status';
      if (!val('Education'))      return 'Select your education';
      if (!val('City_Tier'))      return 'Select city tier';
    }
    if (n === 2) {
      if (!val('Employment_Type'))   return 'Select employment type';
      if (!val('Employer_Category')) return 'Select employer category';
      if (val('Work_Experience_Yrs') === '' || isNaN(num('Work_Experience_Yrs')) || num('Work_Experience_Yrs') < 0)
        return 'Enter valid work experience';
    }
    if (n === 3) {
      if (!val('Net_Monthly_Income') || num('Net_Monthly_Income') <= 0)
        return 'Enter your monthly income';
      if (!val('Monthly_Expenses') || num('Monthly_Expenses') < 0)
        return 'Enter monthly expenses';
      if (num('Monthly_Expenses') >= num('Net_Monthly_Income'))
        return 'Expenses cannot exceed income';
      const cibil = num('CIBIL_Score');
      if (!val('CIBIL_Score') || cibil < 300 || cibil > 900)
        return 'CIBIL score must be 300–900';
    }
    if (n === 4) {
      if (!val('Loan_Amount_Requested') || num('Loan_Amount_Requested') <= 0)
        return 'Enter the loan amount';
      if (!val('Loan_Tenure_Months'))
        return 'Select loan tenure';
    }
    return null;
  }

  // ── Step navigation ───────────────────────────────────────────────────────
  let currentStep = 1;

  function goTo(n) {
    clearErr();
    if (n > currentStep) {
      const err = validateStep(currentStep);
      if (err) { showError(currentStep, err); return; }
      markDone(currentStep);
    }
    document.getElementById('step' + currentStep).classList.remove('active');
    document.getElementById('pb'   + currentStep).classList.remove('active');
    currentStep = n;
    document.getElementById('step' + currentStep).classList.add('active');
    document.getElementById('pb'   + currentStep).classList.add('active');
  }

  function showError(step, msg) {
    // Show inline alert on the current step
    alert(msg); // simple fallback — good enough for all steps
  }

  function markDone(n) {
    document.getElementById('pb' + n).classList.remove('active');
    document.getElementById('pb' + n).classList.add('done');
  }

  function toggleEmpCat() {
    const t = val('Employment_Type');
    const sel = document.getElementById('Employer_Category');
    if (t === 'Self-Employed') {
      sel.value = 'Self-Employed';
    }
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  async function submitForm() {
    clearErr();
    const err = validateStep(4);
    if (err) { showErr(err); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analysing…';

    const payload = {
      Age:                   val('Age'),
      Gender:                val('Gender'),
      Marital_Status:        val('Marital_Status'),
      Dependents:            val('Dependents'),
      Education:             val('Education'),
      City_Tier:             val('City_Tier'),
      Employment_Type:       val('Employment_Type'),
      Employer_Category:     val('Employer_Category'),
      Work_Experience_Yrs:   val('Work_Experience_Yrs'),
      Net_Monthly_Income:    val('Net_Monthly_Income'),
      Monthly_Expenses:      val('Monthly_Expenses'),
      Existing_EMI:          val('Existing_EMI') || '0',
      CIBIL_Score:           val('CIBIL_Score'),
      Loan_Amount_Requested: val('Loan_Amount_Requested'),
      Loan_Tenure_Months:    val('Loan_Tenure_Months'),
    };

    try {
      const res  = await fetch('/predict', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (data.error) { showErr('Error: ' + data.error); return; }

      renderResult(data);
    } catch (e) {
      showErr('Network error — please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Check Eligibility';
    }
  }

  // ── Render result ─────────────────────────────────────────────────────────
  function fmt(n) {
    return '\u20b9' + n.toLocaleString('en-IN');
  }

  function renderResult(d) {
    // Hide steps, show result
    document.getElementById('step4').classList.remove('active');
    const r = document.getElementById('result');
    r.style.display = 'block';
    r.scrollIntoView({ behavior: 'smooth' });

    // Header
    const hdr = document.getElementById('resultHeader');
    hdr.className = 'result-header ' + (d.approved ? 'approved-header' : 'rejected-header');
    document.getElementById('resultVerdict').textContent =
      d.approved ? '✅ Loan Approved' : '❌ Loan Rejected';
    document.getElementById('resultConf').textContent =
      `Model confidence: ${d.confidence}%`;

    // Metrics
    document.getElementById('mDTI').textContent   = d.dti + '%';
    document.getElementById('mRate').textContent  = d.interest_rate + '%';
    document.getElementById('mMax').textContent   = fmt(d.max_eligible);
    document.getElementById('mEMI1').textContent  = fmt(d.emi_on_requested) + '/mo';
    document.getElementById('mEMI2').textContent  = d.max_eligible > 0 ? fmt(d.emi_on_max) + '/mo' : '—';

    // Feedback
    renderFeedback('fbStrengths', d.strengths, '✅', 'h3-green', 'Strengths');
    renderFeedback('fbProblems',  d.reasons,   '⚠️', 'h3-red',   'Concerns');
    renderFeedback('fbTips',      d.tips,      '💡', 'h3-yellow','Tips to Improve');
  }

  function renderFeedback(id, items, icon, cls, title) {
    const el = document.getElementById(id);
    if (!items || items.length === 0) { el.innerHTML = ''; return; }
    let html = `<h3 class="${cls}">${title}</h3>`;
    items.forEach(txt => {
      html += `<div class="feedback-item">
        <span class="feedback-icon">${icon}</span>
        <span>${txt}</span>
      </div>`;
    });
    el.innerHTML = html;
  }

  // ── Reset ─────────────────────────────────────────────────────────────────
  function resetForm() {
    document.getElementById('result').style.display = 'none';
    // Reset all progress bubbles
    for (let i = 1; i <= 4; i++) {
      const pb = document.getElementById('pb' + i);
      pb.classList.remove('active', 'done');
    }
    // Clear form
    document.querySelectorAll('input, select').forEach(el => {
      if (el.id === 'Existing_EMI') el.value = '0';
      else el.value = '';
    });
    currentStep = 1;
    document.getElementById('pb1').classList.add('active');
    document.getElementById('step4').classList.remove('active');
    document.getElementById('step1').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
